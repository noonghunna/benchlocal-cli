# git-cliff config for benchlocal-cli — auto-generates BOTH the GitHub Release
# body AND CHANGELOG.md from commit messages. Workflow:
#   git tag v0.X.Y && git push origin v0.X.Y
#     → .github/workflows/release.yml runs
#       → cliff renders the GitHub Release body (--latest --strip header)
#       → cliff regenerates the full CHANGELOG.md (writes back to master)
#       → release published with the latest-only body
#
# Don't hand-edit CHANGELOG.md — it gets overwritten on the next tag. Write
# rich commit message bodies and they'll flow into both surfaces.

[changelog]
# Header rendered once at top of CHANGELOG.md (preserved across full regens).
# Stripped from the GitHub Release body via `--strip header`.
header = """
# Changelog

Auto-generated from commit subjects by [git-cliff](https://git-cliff.org/) on tag
push. Click any commit SHA below to see the full message body (why / how /
validation data) — those live in `git log`, not here. Don't hand-edit; the file
is regenerated on every tag. See the
[GitHub Release pages](https://github.com/noonghunna/benchlocal-cli/releases) for
the same content per-version.

---

"""

# Per-version body. **Subject-line only** — full commit body (why/how/
# validation) lives in `git log` and is one click away via the SHA link.
# Keeps CHANGELOG.md skim-readable.
body = """
{% if version %}\
## {{ version }}{% if timestamp %} — {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}

{% else %}\
## Unreleased

{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}\
- {{ commit.message | split(pat="\\n") | first | trim }}{% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/noonghunna/benchlocal-cli/pull/{{ commit.github.pr_number }}) by @{{ commit.github.username }}){% else %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/noonghunna/benchlocal-cli/commit/{{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}

{% if version %}[Install: `pip install git+https://github.com/noonghunna/benchlocal-cli.git@{{ version }}`]{% if previous.version %} · [Full diff](https://github.com/noonghunna/benchlocal-cli/compare/{{ previous.version }}...{{ version }}){% endif %}
{% endif %}
"""

footer = ""

trim = true
postprocessors = []

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
topo_order = false
sort_commits = "newest"
filter_commits = false

# Patterns matched in order. PREFIX-BASED first (deterministic), then
# keyword-based fallback for unprefixed messages.
commit_parsers = [
    # Skip merge headers
    { message = "^Merge pull request", skip = true },
    { message = "^Merge branch", skip = true },
    { message = "^Merge remote-tracking", skip = true },

    # Prefix-based — anchored to subject line
    { message = "^feat[(:]", group = "✨ Features" },
    { message = "^feature[(:]", group = "✨ Features" },

    { message = "^fix[(:]", group = "🐛 Bug fixes" },
    { message = "^bugfix[(:]", group = "🐛 Bug fixes" },
    { message = "^hotfix[(:]", group = "🐛 Bug fixes" },

    { message = "^docs?[(:]", group = "📝 Documentation" },
    { message = "^README", group = "📝 Documentation" },

    { message = "^test[(:]", group = "🧪 Tests" },
    { message = "^tests?[(:]", group = "🧪 Tests" },

    { message = "^ci[(:]", group = "🛠️ Tooling + CI" },
    { message = "^build[(:]", group = "🛠️ Tooling + CI" },
    { message = "^tools?[(:]", group = "🛠️ Tooling + CI" },

    { message = "^perf[(:]", group = "⚡ Performance" },

    { message = "^refactor[(:]", group = "🧹 Refactoring + maintenance" },
    { message = "^chore[(:]", group = "🧹 Refactoring + maintenance" },
    { message = "^style[(:]", group = "🧹 Refactoring + maintenance" },

    { message = "^scaffolding[(:]", group = "🚧 Scaffolding" },

    # Version-bump commits (e.g. "v0.5: ...") — group as features since they
    # usually accompany substantive changes.
    { message = "^v[0-9]+\\.[0-9]+", group = "✨ Features" },

    # Catch-all
    { message = ".*", group = "🧹 Other" },
]

tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
ignore_tags = ""

# GitHub API enrichment — now public (flipped 2026-05-10) so this works and
# gives PR/contributor links in rendered release notes.
[remote.github]
owner = "noonghunna"
repo = "benchlocal-cli"
